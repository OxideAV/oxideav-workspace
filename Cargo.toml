oxideav-ass = { path = "crates/oxideav-ass", version = "0.0" }
oxideav-prores = { path = "crates/oxideav-prores", version = "0.0" }
oxideav-jpegxl = { path = "crates/oxideav-jpegxl", version = "0.0" }
oxideav-jpeg2000 = { path = "crates/oxideav-jpeg2000", version = "0.0" }
oxideav-avif = { path = "crates/oxideav-avif", version = "0.0" }
oxideav-source = { path = "crates/oxideav-source", version = "0.0" }
oxideav-http = { path = "crates/oxideav-http", version = "0.0" }
oxideav-job = { path = "crates/oxideav-job", version = "0.0" }

# The aggregator crate stays in this workspace (it's the "everything
# wired up" entry point for the CLI / player / integration tests).
oxideav = { path = "crates/oxideav", version = "0.0.3" }

thiserror = "1"
clap = { version = "4", features = ["derive"] }

[profile.release]
lto = "thin"
codegen-units = 1

# Redirect every oxideav-* crates.io dep to the matching `crates/<name>/`
# workspace member. Individual sibling Cargo.tomls depend on each other via
# plain `"0.0"` version strings (not `workspace = true`) because each lives
# in its own OxideAV/<name>/ repository; this patch table lets the
# workspace consume all of them from local paths without modifying their
# manifests. Rebuild this block after running
# `scripts/clone-siblings.sh` for a newly-added crate.
[patch.crates-io]
oxideav-core = { path = "crates/oxideav-core" }
oxideav-codec = { path = "crates/oxideav-codec" }
oxideav-container = { path = "crates/oxideav-container" }
