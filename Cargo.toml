[workspace]
resolver = "2"
# Every crate under `crates/` is a workspace member — both the native
# ones (oxideav, oxideav-cli, oxideplay, oxideav-tests) and every
# OxideAV/oxideav-* sibling cloned by `scripts/clone-siblings.sh`.
# Globbing keeps the workspace self-contained (no crates.io resolution
# needed for any oxideav-* dep) and means adding a new sibling is just
# `scripts/clone-siblings.sh` away from building locally.
members = ["crates/*"]

[workspace.package]
version = "0.0.3"
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://github.com/OxideAV/oxideav-workspace"
homepage = "https://github.com/OxideAV/oxideav-workspace"
authors = ["Mark Karpeles"]
readme = "README.md"

[workspace.dependencies]
# Every per-format codec, container, filter, source driver, and codec-trait
# crate now lives in its own OxideAV/* repository and is cloned into
# `crates/` by `scripts/clone-siblings.sh`. The `path` entry makes cargo
# use the local copy unconditionally, so the workspace never talks to
# crates.io for any oxideav-* dep. `version` stays pinned at "0.0" so the
# constraint survives a round-trip through `cargo publish`.
oxideav-core = { path = "crates/oxideav-core", version = "0.1" }
oxideav-codec = { path = "crates/oxideav-codec", version = "0.1" }
oxideav-container = { path = "crates/oxideav-container", version = "0.1" }
oxideav-pipeline = { path = "crates/oxideav-pipeline", version = "0.0" }
oxideav-basic = { path = "crates/oxideav-basic", version = "0.0" }
oxideav-ogg = { path = "crates/oxideav-ogg", version = "0.0" }
oxideav-vorbis = { path = "crates/oxideav-vorbis", version = "0.0" }
oxideav-opus = { path = "crates/oxideav-opus", version = "0.0" }
oxideav-ffv1 = { path = "crates/oxideav-ffv1", version = "0.0" }
oxideav-flac = { path = "crates/oxideav-flac", version = "0.0" }
oxideav-mkv = { path = "crates/oxideav-mkv", version = "0.0" }
oxideav-mp4 = { path = "crates/oxideav-mp4", version = "0.0" }
oxideav-avi = { path = "crates/oxideav-avi", version = "0.0" }
oxideav-mjpeg = { path = "crates/oxideav-mjpeg", version = "0.1" }
oxideav-mpeg12video = { path = "crates/oxideav-mpeg12video", version = "0.0" }
oxideav-vp9 = { path = "crates/oxideav-vp9", version = "0.0" }
oxideav-h265 = { path = "crates/oxideav-h265", version = "0.0" }
oxideav-h264 = { path = "crates/oxideav-h264", version = "0.0" }
oxideav-av1 = { path = "crates/oxideav-av1", version = "0.0" }
oxideav-h263 = { path = "crates/oxideav-h263", version = "0.0" }
oxideav-vp8 = { path = "crates/oxideav-vp8", version = "0.0" }
oxideav-audio-filter = { path = "crates/oxideav-audio-filter", version = "0.0" }
oxideav-pixfmt = { path = "crates/oxideav-pixfmt", version = "0.1" }
oxideav-mpeg4video = { path = "crates/oxideav-mpeg4video", version = "0.1" }
oxideav-msmpeg4 = { path = "crates/oxideav-msmpeg4", version = "0.0" }
oxideav-theora = { path = "crates/oxideav-theora", version = "0.0" }
oxideav-iff = { path = "crates/oxideav-iff", version = "0.0" }
oxideav-mod = { path = "crates/oxideav-mod", version = "0.0" }
oxideav-s3m = { path = "crates/oxideav-s3m", version = "0.0" }
oxideav-mp1 = { path = "crates/oxideav-mp1", version = "0.0" }
oxideav-mp2 = { path = "crates/oxideav-mp2", version = "0.0" }
oxideav-mp3 = { path = "crates/oxideav-mp3", version = "0.0" }
oxideav-id3 = { path = "crates/oxideav-id3", version = "0.0" }
oxideav-aac = { path = "crates/oxideav-aac", version = "0.0" }
oxideav-celt = { path = "crates/oxideav-celt", version = "0.0" }
