[workspace]
resolver = "2"
members = [
    "crates/oxideav-core",
    "crates/oxideav-codec",
    "crates/oxideav-container",
    "crates/oxideav-pipeline",
    "crates/oxideav-basic",
    "crates/oxideav-ogg",
    "crates/oxideav-vorbis",
    "crates/oxideav-opus",
    "crates/oxideav-flac",
    "crates/oxideav-mkv",
    "crates/oxideav-mp4",
    "crates/oxideav-mjpeg",
    "crates/oxideav-ffv1",
    "crates/oxideav-iff",
    "crates/oxideav-mod",
    "crates/oxideav-mp1",
    "crates/oxideav-mp2",
    "crates/oxideav-mp3",
    "crates/oxideav-aac",
    "crates/oxideav-celt",
    "crates/oxideav-g7231",
    "crates/oxideav-g728",
    "crates/oxideav-g729",
    "crates/oxideav-gsm",
    "crates/oxideav-speex",
    "crates/oxideav",
    "crates/oxideav-cli",
]

[workspace.package]
version = "0.0.1"
edition = "2021"
rust-version = "1.80"
license = "MIT OR Apache-2.0"
repository = "https://github.com/KarpelesLab/oxideav"
authors = ["Mark Karpeles"]

[workspace.dependencies]
oxideav-core = { path = "crates/oxideav-core", version = "0.0.1" }
oxideav-codec = { path = "crates/oxideav-codec", version = "0.0.1" }
oxideav-container = { path = "crates/oxideav-container", version = "0.0.1" }
oxideav-pipeline = { path = "crates/oxideav-pipeline", version = "0.0.1" }
oxideav-basic = { path = "crates/oxideav-basic", version = "0.0.1" }
oxideav-ogg = { path = "crates/oxideav-ogg", version = "0.0.1" }
oxideav-vorbis = { path = "crates/oxideav-vorbis", version = "0.0.1" }
oxideav-opus = { path = "crates/oxideav-opus", version = "0.0.1" }
oxideav-flac = { path = "crates/oxideav-flac", version = "0.0.1" }
oxideav-mkv = { path = "crates/oxideav-mkv", version = "0.0.1" }
oxideav-mp4 = { path = "crates/oxideav-mp4", version = "0.0.1" }
oxideav-mjpeg = { path = "crates/oxideav-mjpeg", version = "0.0.1" }
oxideav-ffv1 = { path = "crates/oxideav-ffv1", version = "0.0.1" }
oxideav-iff = { path = "crates/oxideav-iff", version = "0.0.1" }
oxideav-mod = { path = "crates/oxideav-mod", version = "0.0.1" }
oxideav-mp1 = { path = "crates/oxideav-mp1", version = "0.0.1" }
oxideav-mp2 = { path = "crates/oxideav-mp2", version = "0.0.1" }
oxideav-mp3 = { path = "crates/oxideav-mp3", version = "0.0.1" }
oxideav-aac = { path = "crates/oxideav-aac", version = "0.0.1" }
oxideav-celt = { path = "crates/oxideav-celt", version = "0.0.1" }
oxideav-g7231 = { path = "crates/oxideav-g7231", version = "0.0.1" }
oxideav-g728 = { path = "crates/oxideav-g728", version = "0.0.1" }
oxideav-g729 = { path = "crates/oxideav-g729", version = "0.0.1" }
oxideav-gsm = { path = "crates/oxideav-gsm", version = "0.0.1" }
oxideav-speex = { path = "crates/oxideav-speex", version = "0.0.1" }
oxideav = { path = "crates/oxideav", version = "0.0.1" }

thiserror = "1"
clap = { version = "4", features = ["derive"] }

[profile.release]
lto = "thin"
codegen-units = 1
