[package]
name = "oxideplay"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Reference media player for the oxideav framework (SDL2 + crossterm)"

readme = "README.md"
homepage.workspace = true
keywords = ["multimedia", "player", "audio", "video", "sdl2"]
categories = ["multimedia", "command-line-utilities"]
# oxideplay is the only binary in the workspace allowed non-pure deps. We
# load SDL2 *at runtime* through `libloading` rather than linking against
# rust-sdl2 / sdl2-sys at build time — this keeps SDL2 a soft dependency
# (the binary still builds and runs in headless mode without it). The
# library half of oxideav stays 100% pure Rust.
[features]
default = ["http"]
# Pulls oxideav-http through the aggregator. Disable to drop the
# ureq/rustls dependency tree from the player binary.
http = ["oxideav/http"]
# Pure-Rust window + GPU + audio backend as an alternative to SDL2.
# Links against winit (windowing), wgpu (GPU YUV→RGB), and cpal (audio).
# None of these ship C code; they wrap the platform APIs the same way
# winit does for its own event loop.
winit = [
    "dep:winit",
    "dep:wgpu",
    "dep:cpal",
    "dep:bytemuck",
    "dep:pollster",
    "dep:ringbuf",
]

[dependencies]
oxideav = { workspace = true }
oxideav-core = { workspace = true }
oxideav-codec = { workspace = true }
oxideav-container = { workspace = true }
oxideav-source = { workspace = true }
clap = { workspace = true }
crossterm = "0.28"
libloading = "0.8"
winit = { version = "0.30", optional = true }
wgpu = { version = "23", optional = true }
cpal = { version = "0.15", optional = true }
bytemuck = { version = "1", optional = true, features = ["derive"] }
pollster = { version = "0.3", optional = true }
ringbuf = { version = "0.4", optional = true }
