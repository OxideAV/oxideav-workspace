[package]
name = "oxideplay"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Reference media player for the oxideav framework (runtime-loaded SDL2 / winit / sysaudio)"

readme = "README.md"
homepage.workspace = true
keywords = ["multimedia", "player", "audio", "video"]
categories = ["multimedia", "command-line-utilities"]
# Build-time features toggle which backends are *compiled in*. At
# runtime, the `--vo` / `--ao` CLI flags pick which of those to use.
# Every backend still loads its native shared library through
# `libloading`, so no C library ends up in the binary's NEEDED list.
[features]
default = ["http", "sdl2", "winit", "sysaudio"]
# Pulls oxideav-http through the aggregator. Disable to drop the
# ureq/rustls dependency tree from the player binary.
http = ["oxideav/http"]
# SDL2 video + audio via the runtime-loaded libSDL2 (sdl2_loader.rs).
# Pure-Rust â€” no build-time C deps, just libloading. When this feature
# is on, `--vo sdl2` and `--ao sdl2` become available.
sdl2 = []
# winit windowing + wgpu GPU YUVâ†’RGB. Video-only â€” audio goes through
# `sysaudio` (or `sdl2`) independently. Enables `--vo winit`. Pulls in
# the `egui` overlay UI by default â€” egui-wgpu integrates naturally
# with the wgpu YUVâ†’RGB pass and is pure Rust like the rest.
winit = ["dep:winit", "dep:wgpu", "dep:bytemuck", "dep:pollster", "egui"]
# Mouse-driven on-screen overlay (play/pause, seek bar, volume) drawn
# on top of the wgpu video surface. Only meaningful when `winit` is
# also on; gated separately so a downstream consumer can disable the
# UI without losing the wgpu renderer.
egui = ["dep:egui", "dep:egui-wgpu", "dep:egui-winit"]
# oxideav-sysaudio: runtime-loaded ALSA / PulseAudio / WASAPI /
# CoreAudio. Enables `--ao sysaudio` and direct driver names like
# `--ao pulse`, `--ao alsa`. `ringbuf` is the SPSC buffer between the
# player producer and the sysaudio pull callback.
sysaudio = ["dep:oxideav-sysaudio", "dep:ringbuf"]

[dependencies]
oxideav = { workspace = true }
oxideav-core = { workspace = true }
oxideav-source = { workspace = true }
oxideav-pixfmt = { workspace = true }
clap = { workspace = true }
crossterm = "0.29"
libloading = "0.9"
serde_json = "1"

# Optional deps, pulled in by the feature gates above.
winit = { version = "0.30", optional = true }
wgpu = { version = "29", optional = true }
oxideav-sysaudio = { workspace = true, optional = true }
bytemuck = { version = "1", optional = true, features = ["derive"] }
pollster = { version = "0.4", optional = true }
ringbuf = { version = "0.4", optional = true }
# egui overlay stack. 0.34.x is the line that depends on wgpu 29 +
# winit 0.30, matching the renderer above. egui-winit needs default
# features off so it doesn't pull in clipboard / arboard, which drag
# in C deps on Linux.
egui = { version = "0.34", optional = true, default-features = false }
egui-wgpu = { version = "0.34", optional = true, default-features = false, features = ["winit"] }
egui-winit = { version = "0.34", optional = true, default-features = false, features = ["links"] }
