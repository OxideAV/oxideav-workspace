[package]
name = "oxideav"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Central aggregator crate for oxideav — re-exports and a prebuilt registry"

readme = "README.md"
homepage.workspace = true
keywords = ["multimedia", "audio", "video", "codec", "transcoding"]
categories = ["multimedia", "multimedia::encoding"]

[features]
default = [
    "basic",
    "ogg",
    "vorbis",
    "opus",
    "flac",
    "mkv",
    "webm",
    "mp4",
    "avi",
    "iff",
    "amiga_mod",
    "s3m",
    "mp1",
    "mp2",
    "mp3",
    "mjpeg",
    "mpeg1video",
    "mpeg2video",
    "mpeg4video",
    "msmpeg4",
    "theora",
    "aac",
    "celt",
    "g711",
    "g722",
    "g7231",
    "g728",
    "g729",
    "gsm",
    "speex",
    "vp9",
    "h265",
    "h264",
    "av1",
    "h263",
    "vp8",
    "webp",
    "gif",
    "png",
    "amv",
    "subtitle",
    "sub_image",
    "ass",
    "ffv1",
    "prores",
    "audio_filter",
    "pixfmt",
    "job",
    "jpegxl",
    "jpeg2000",
    "avif",
]
basic = ["dep:oxideav-basic"]
job = ["dep:oxideav-job"]
ogg = ["dep:oxideav-ogg"]
vorbis = ["dep:oxideav-vorbis"]
opus = ["dep:oxideav-opus"]
flac = ["dep:oxideav-flac"]
mkv = ["dep:oxideav-mkv"]
# WebM rides the oxideav-mkv crate — the demuxer is shared and the muxer
# exposes a DocType="webm" mode with a VP8/VP9/AV1/Vorbis/Opus whitelist.
webm = ["mkv"]
mp4 = ["dep:oxideav-mp4"]
avi = ["dep:oxideav-avi"]
iff = ["dep:oxideav-iff"]
amiga_mod = ["dep:oxideav-mod"]
s3m = ["dep:oxideav-s3m"]
mp1 = ["dep:oxideav-mp1"]
mp2 = ["dep:oxideav-mp2"]
mp3 = ["dep:oxideav-mp3"]
mjpeg = ["dep:oxideav-mjpeg"]
mpeg1video = ["dep:oxideav-mpeg12video"]
# MPEG-2 video (H.262) is served by the same crate (`oxideav-mpeg12video`)
# as MPEG-1 video; this feature is a cosmetic alias so downstream users can
# request `mpeg2video` without caring about the internal crate layout.
mpeg2video = ["mpeg1video"]
mpeg4video = ["dep:oxideav-mpeg4video"]
msmpeg4 = ["dep:oxideav-msmpeg4"]
theora = ["dep:oxideav-theora"]
aac = ["dep:oxideav-aac"]
celt = ["dep:oxideav-celt"]
g711 = ["dep:oxideav-g711"]
g722 = ["dep:oxideav-g722"]
g7231 = ["dep:oxideav-g7231"]
g728 = ["dep:oxideav-g728"]
g729 = ["dep:oxideav-g729"]
gsm = ["dep:oxideav-gsm"]
speex = ["dep:oxideav-speex"]
vp9 = ["dep:oxideav-vp9"]
h265 = ["dep:oxideav-h265"]
h264 = ["dep:oxideav-h264"]
av1 = ["dep:oxideav-av1"]
h263 = ["dep:oxideav-h263"]
vp8 = ["dep:oxideav-vp8"]
webp = ["dep:oxideav-webp"]
gif = ["dep:oxideav-gif"]
png = ["dep:oxideav-png"]
amv = ["dep:oxideav-amv"]
subtitle = ["dep:oxideav-subtitle"]
sub_image = ["dep:oxideav-sub-image"]
ass = ["dep:oxideav-ass"]
ffv1 = ["dep:oxideav-ffv1"]
prores = ["dep:oxideav-prores"]
jpegxl = ["dep:oxideav-jpegxl"]
# `jxl` is an alias — the JPEG XL spec uses both names interchangeably.
jxl = ["jpegxl"]
jpeg2000 = ["dep:oxideav-jpeg2000"]
# `jp2` is the ISO BMFF-boxed flavour of JPEG 2000; it rides the same crate.
jp2 = ["jpeg2000"]
avif = ["dep:oxideav-avif"]
audio_filter = ["dep:oxideav-audio-filter"]
pixfmt = ["dep:oxideav-pixfmt"]
# HTTP/HTTPS source driver. Off by default — opt in to link ureq + rustls.
http = ["dep:oxideav-http"]

[dependencies]
oxideav-core = { workspace = true }
oxideav-codec = { workspace = true }
oxideav-container = { workspace = true }
oxideav-pipeline = { workspace = true }
oxideav-source = { workspace = true }
oxideav-http = { workspace = true, optional = true }
oxideav-basic = { workspace = true, optional = true }
oxideav-ogg = { workspace = true, optional = true }
oxideav-vorbis = { workspace = true, optional = true }
oxideav-opus = { workspace = true, optional = true }
oxideav-flac = { workspace = true, optional = true }
oxideav-mkv = { workspace = true, optional = true }
oxideav-mp4 = { workspace = true, optional = true }
