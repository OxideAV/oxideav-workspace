[package]
name = "oxideav"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Central aggregator crate for oxideav — re-exports and a prebuilt registry"

[features]
default = [
    "basic",
    "ogg",
    "vorbis",
    "opus",
    "flac",
    "mkv",
    "mp4",
    "avi",
    "iff",
    "amiga_mod",
    "s3m",
    "mp1",
    "mp2",
    "mp3",
    "mjpeg",
    "mpeg1video",
    "mpeg4video",
    "theora",
    "aac",
    "celt",
    "g7231",
    "g728",
    "g729",
    "gsm",
    "speex",
    "vp9",
    "h265",
    "h264",
    "av1",
]
basic = ["dep:oxideav-basic"]
ogg = ["dep:oxideav-ogg"]
vorbis = ["dep:oxideav-vorbis"]
opus = ["dep:oxideav-opus"]
flac = ["dep:oxideav-flac"]
mkv = ["dep:oxideav-mkv"]
mp4 = ["dep:oxideav-mp4"]
avi = ["dep:oxideav-avi"]
iff = ["dep:oxideav-iff"]
amiga_mod = ["dep:oxideav-mod"]
s3m = ["dep:oxideav-s3m"]
mp1 = ["dep:oxideav-mp1"]
mp2 = ["dep:oxideav-mp2"]
mp3 = ["dep:oxideav-mp3"]
mjpeg = ["dep:oxideav-mjpeg"]
mpeg1video = ["dep:oxideav-mpeg1video"]
mpeg4video = ["dep:oxideav-mpeg4video"]
theora = ["dep:oxideav-theora"]
aac = ["dep:oxideav-aac"]
celt = ["dep:oxideav-celt"]
g7231 = ["dep:oxideav-g7231"]
g728 = ["dep:oxideav-g728"]
g729 = ["dep:oxideav-g729"]
gsm = ["dep:oxideav-gsm"]
speex = ["dep:oxideav-speex"]
vp9 = ["dep:oxideav-vp9"]
h265 = ["dep:oxideav-h265"]
h264 = ["dep:oxideav-h264"]
av1 = ["dep:oxideav-av1"]

[dependencies]
oxideav-core = { workspace = true }
oxideav-codec = { workspace = true }
oxideav-container = { workspace = true }
oxideav-pipeline = { workspace = true }
oxideav-basic = { workspace = true, optional = true }
oxideav-ogg = { workspace = true, optional = true }
oxideav-vorbis = { workspace = true, optional = true }
oxideav-opus = { workspace = true, optional = true }
oxideav-flac = { workspace = true, optional = true }
oxideav-mkv = { workspace = true, optional = true }
oxideav-mp4 = { workspace = true, optional = true }
oxideav-avi = { workspace = true, optional = true }
oxideav-iff = { workspace = true, optional = true }
oxideav-mod = { workspace = true, optional = true }
oxideav-s3m = { workspace = true, optional = true }
oxideav-mp1 = { workspace = true, optional = true }
oxideav-mp2 = { workspace = true, optional = true }
oxideav-mp3 = { workspace = true, optional = true }
oxideav-mjpeg = { workspace = true, optional = true }
oxideav-mpeg1video = { workspace = true, optional = true }
oxideav-mpeg4video = { workspace = true, optional = true }
oxideav-theora = { workspace = true, optional = true }
oxideav-aac = { workspace = true, optional = true }
oxideav-celt = { workspace = true, optional = true }
oxideav-g7231 = { workspace = true, optional = true }
