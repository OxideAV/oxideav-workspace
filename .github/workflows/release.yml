name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: oxideav

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            rust_targets: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            label: macos-universal
            rust_targets: x86_64-apple-darwin,aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            label: windows-x86_64
            rust_targets: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (targets ${{ matrix.rust_targets }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.label }}

      - name: Build release binary (Linux)
        if: matrix.label == 'linux-x86_64'
        run: cargo build --release --target x86_64-unknown-linux-gnu -p oxideav-cli

      - name: Build release binaries (macOS, both arches)
        if: matrix.label == 'macos-universal'
        run: |
          cargo build --release --target x86_64-apple-darwin -p oxideav-cli
          cargo build --release --target aarch64-apple-darwin -p oxideav-cli

      - name: Build release binary (Windows)
        if: matrix.label == 'windows-x86_64'
        run: cargo build --release --target x86_64-pc-windows-msvc -p oxideav-cli

      - name: Stage release artifact (Linux)
        if: matrix.label == 'linux-x86_64'
        shell: bash
        run: |
          set -eu
          stage="${BIN_NAME}-${GITHUB_REF_NAME}-${{ matrix.label }}"
          mkdir -p "dist/${stage}"
          cp "target/x86_64-unknown-linux-gnu/release/${BIN_NAME}" "dist/${stage}/"
          cp README.md "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"

      - name: Stage release artifact (macOS, lipo'd universal)
        if: matrix.label == 'macos-universal'
        shell: bash
        run: |
          set -eu
          stage="${BIN_NAME}-${GITHUB_REF_NAME}-${{ matrix.label }}"
          mkdir -p "dist/${stage}"
          lipo -create \
            "target/x86_64-apple-darwin/release/${BIN_NAME}" \
            "target/aarch64-apple-darwin/release/${BIN_NAME}" \
            -output "dist/${stage}/${BIN_NAME}"
          # Sanity: make sure the result is actually a fat binary.
          file "dist/${stage}/${BIN_NAME}"
          lipo -info "dist/${stage}/${BIN_NAME}"
          cp README.md "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"

      - name: Stage release artifact (Windows)
        if: matrix.label == 'windows-x86_64'
        shell: pwsh
        run: |
          $stage = "$env:BIN_NAME-$env:GITHUB_REF_NAME-${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path "dist\$stage" | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\$env:BIN_NAME.exe" "dist\$stage\"
          Copy-Item README.md "dist\$stage\"
          Compress-Archive -Path "dist\$stage" -DestinationPath "dist\$stage.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.label }}.${{ matrix.archive }}
          fail_on_unmatched_files: true
          generate_release_notes: true
