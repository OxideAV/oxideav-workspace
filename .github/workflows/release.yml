name: Release

# Builds the `oxideav` CLI + `oxideplay` binaries for Linux x86_64,
# macOS (universal), and Windows x86_64, then attaches them to the
# matching GitHub Release.
#
# To cut a release: bump `[workspace.package].version` in Cargo.toml,
# commit, then `git tag vX.Y.Z && git push origin vX.Y.Z`. The tag push
# triggers this workflow and the binaries land on the GitHub Release
# page. Use `workflow_dispatch` with the `tag` input to rebuild for an
# existing tag (e.g. if a previous run failed mid-build).
#
# Library crates (oxideav-core, every codec/container, the aggregator,
# …) are released independently by their own sibling repos' release-plz
# workflows on crates.io. The workspace itself doesn't publish to
# crates.io — `oxideav-cli` and `oxideplay` are binaries, not libs.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build binaries for (e.g. v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  # On tag-push this is the tag (e.g. "v0.1.0"); on workflow_dispatch it's
  # the tag the user typed into the "tag" input.
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            rust_targets: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            label: macos-universal
            rust_targets: x86_64-apple-darwin,aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            label: windows-x86_64
            rust_targets: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      # oxideplay loads SDL2 at runtime via libloading, so the release
      # build does NOT need SDL2 installed. Users who don't have a
      # system SDL2 see a "library not found" message at play time
      # instead of a broken binary at startup.

      - name: Install Rust toolchain (targets ${{ matrix.rust_targets }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Every per-format codec / container / aggregator crate lives in
      # its own OxideAV/oxideav-* repo. The workspace's `crates/*` glob
      # needs every member's Cargo.toml on disk for `cargo build` to
      # load the workspace, so clone the siblings before building.
      - name: Clone sub-crate checkouts into crates/
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/clone-crates.sh

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.label }}

      - name: Build release binaries (Linux)
        if: matrix.label == 'linux-x86_64'
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu -p oxideav-cli
          cargo build --release --target x86_64-unknown-linux-gnu -p oxideplay

      - name: Build release binaries (macOS, both arches)
        if: matrix.label == 'macos-universal'
        run: |
          cargo build --release --target x86_64-apple-darwin -p oxideav-cli
          cargo build --release --target x86_64-apple-darwin -p oxideplay
          cargo build --release --target aarch64-apple-darwin -p oxideav-cli
          cargo build --release --target aarch64-apple-darwin -p oxideplay

      - name: Build release binaries (Windows)
        if: matrix.label == 'windows-x86_64'
        run: |
          cargo build --release --target x86_64-pc-windows-msvc -p oxideav-cli
          cargo build --release --target x86_64-pc-windows-msvc -p oxideplay

      - name: Stage release artifact (Linux)
        if: matrix.label == 'linux-x86_64'
        shell: bash
        run: |
          set -eu
          stage="oxideav-${RELEASE_TAG}-${{ matrix.label }}"
          mkdir -p "dist/${stage}"
          cp "target/x86_64-unknown-linux-gnu/release/oxideav" "dist/${stage}/"
          cp "target/x86_64-unknown-linux-gnu/release/oxideplay" "dist/${stage}/"
          cp README.md LICENSE "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"

      - name: Stage release artifact (macOS, lipo'd universal)
        if: matrix.label == 'macos-universal'
        shell: bash
        run: |
          set -eu
          stage="oxideav-${RELEASE_TAG}-${{ matrix.label }}"
          mkdir -p "dist/${stage}"
          for bin in oxideav oxideplay; do
            lipo -create \
              "target/x86_64-apple-darwin/release/${bin}" \
              "target/aarch64-apple-darwin/release/${bin}" \
              -output "dist/${stage}/${bin}"
            # Sanity: make sure the result is actually a fat binary.
            file "dist/${stage}/${bin}"
            lipo -info "dist/${stage}/${bin}"
          done
          cp README.md LICENSE "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"

      - name: Stage release artifact (Windows)
        if: matrix.label == 'windows-x86_64'
        shell: pwsh
        run: |
          $stage = "oxideav-$env:RELEASE_TAG-${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path "dist\$stage" | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\oxideav.exe" "dist\$stage\"
          Copy-Item "target\x86_64-pc-windows-msvc\release\oxideplay.exe" "dist\$stage\"
          Copy-Item README.md "dist\$stage\"
          Copy-Item LICENSE "dist\$stage\"
          Compress-Archive -Path "dist\$stage" -DestinationPath "dist\$stage.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/oxideav-${{ env.RELEASE_TAG }}-${{ matrix.label }}.${{ matrix.archive }}
          fail_on_unmatched_files: true
          generate_release_notes: true
