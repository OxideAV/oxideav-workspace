name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      # oxideplay loads SDL2 at runtime via libloading instead of linking
      # at build time, so SDL2 is *not* required to build or test the
      # workspace. The binary will simply emit a "SDL2 library not found
      # at runtime" error if you try to play media without it installed.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Clone every OxideAV/oxideav-* repo into crates/ so the workspace
      # resolves entirely from local paths — no crates.io round-trips for
      # any oxideav-* dep (see scripts/update-crates.sh + [patch.crates-io]
      # in the root Cargo.toml).
      - name: Clone sub-crate checkouts into crates/
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-crates.sh

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      # Build the full workspace to catch integration breaks between
      # native members and the cloned sub-crates. Per-crate lint/unit tests
      # are covered by each crate's own CI — we only run native
      # (oxideav / oxideav-cli / oxideplay / oxideav-tests) tests here so
      # a single crate's red build doesn't block the aggregator.
      - name: Build (workspace, compile-only)
        run: cargo build --workspace --all-targets --verbose

      - name: Test (native members only)
        run: cargo test -p oxideav -p oxideav-cli -p oxideplay -p oxideav-tests --verbose

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # libloading is pure Rust and oxideplay no longer links SDL2, so
      # clippy does not need any system packages installed.

      - name: Install Rust toolchain (with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # The workspace globs `crates/*`, so the sub-crate clones must be in
      # place before clippy / fmt run against them.
      - name: Clone sub-crate checkouts into crates/
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-crates.sh

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      # Lint only the native members. Sibling crates enforce their own
      # rustfmt + clippy in their own CI; applying --all / --workspace
      # here would duplicate that work and flag accumulated style drift
      # across 59 repos on every aggregator push.
      - name: cargo fmt (native members)
        run: cargo fmt -p oxideav -p oxideav-cli -p oxideplay -p oxideav-tests -- --check

      # --no-deps so clippy doesn't flag lint drift inside transitively-
      # depended-on sibling crates; each sibling's own CI enforces its
      # own lints.
      - name: cargo clippy (native members)
        run: |
          cargo clippy -p oxideav -p oxideav-cli -p oxideplay -p oxideav-tests \
            --all-targets --no-deps -- -D warnings

  # USDZ Apple-oracle job: install Apple's `usdzconvert` (from
  # KarpelesLab/usdpython) and run the black-box oracle tests in
  # oxideav-tests against it. The oracle compares Apple's USDZ output
  # vs ours for the same input scene; passing means we agree on mesh /
  # primitive / vertex counts and bounding-box extent.
  #
  # Strict source-isolation: we install the binary + invoke it as an
  # opaque process — never read or vendor its source.
  #
  # Linux + pip's `usd-core` wheel substitutes for the macOS-only
  # precompiled USD library that usdpython normally bundles; the
  # `usdzconvert` Python script imports from `pxr.*`, which `usd-core`
  # provides cross-platform.
  usdz-oracle:
    name: USDZ Apple oracle (KarpelesLab/usdpython)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Clone sub-crate checkouts into crates/
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-crates.sh

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: usdz-oracle

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # `usd-core` ships Pixar's USD library + `pxr` Python bindings
      # as a single PyPI wheel for Linux/macOS/Windows — so we don't
      # need usdpython's macOS-only bundled USD/ directory. Pillow +
      # numpy cover the script's image-handling import surface.
      - name: Install Python USD bindings + image deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install usd-core Pillow numpy

      # Clone the script repo (no USD library bundled — we pulled that
      # via pip above). Put both the script directory and its parent
      # on PATH + PYTHONPATH so `usdzconvert` resolves and its sibling
      # helper modules import without `__init__.py`.
      - name: Install usdpython usdzconvert script
        run: |
          git clone --depth 1 https://github.com/KarpelesLab/usdpython.git "$HOME/usdpython"
          chmod +x "$HOME/usdpython/usdzconvert/usdzconvert"
          echo "$HOME/usdpython/usdzconvert" >> "$GITHUB_PATH"
          echo "PYTHONPATH=$HOME/usdpython/usdzconvert" >> "$GITHUB_ENV"

      # Hard fail if the binary doesn't run — without this, the test
      # file's skip-when-absent path would let CI go green without
      # actually exercising the oracle.
      - name: Verify usdzconvert is callable
        run: |
          which usdzconvert
          usdzconvert -h

      - name: Run USDZ Apple oracle tests
        run: |
          cargo test -p oxideav-tests --test mesh3d_usdz_apple_oracle -- --nocapture
