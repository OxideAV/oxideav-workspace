name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      # oxideplay loads SDL2 at runtime via libloading instead of linking
      # at build time, so SDL2 is *not* required to build or test the
      # workspace. The binary will simply emit a "SDL2 library not found
      # at runtime" error if you try to play media without it installed.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Clone every OxideAV/oxideav-* repo into crates/ so the workspace
      # resolves entirely from local paths — no crates.io round-trips for
      # any oxideav-* dep (see scripts/update-crates.sh + [patch.crates-io]
      # in the root Cargo.toml).
      - name: Clone sub-crate checkouts into crates/
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-crates.sh

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      # Swatinem/rust-cache@v2 occasionally restores a stale
      # `~/.cargo/bin/cargo` symlink on the macos-latest runner that
      # actually points at `rustup-init` (the runner image's bootstrap
      # binary). The cache restore runs AFTER dtolnay/rust-toolchain
      # placed the real cargo, so the cache layer silently overwrites
      # it and every cargo invocation thereafter fails with
      # "unexpected argument 'build' found".
      #
      # Detect via `cargo --version` (real cargo prints "cargo X.Y.Z",
      # the rustup-init shim prints usage to stderr and exits 2) and
      # reinstall the toolchain if wedged. Runs only on macOS — the
      # Linux + Windows runners don't exhibit the issue.
      - name: Unwedge cargo binary on macOS (rust-cache poisoning fix)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! cargo --version 2>/dev/null | grep -q "^cargo "; then
            echo "cargo binary is wedged (resolves to rustup-init); reinstalling toolchain..."
            rustup default stable
            rustup update stable
          fi
          which cargo
          cargo --version

      # Build the full workspace to catch integration breaks between
      # native members and the cloned sub-crates. Per-crate lint/unit tests
      # are covered by each crate's own CI — we only run native
      # (oxideav / oxideav-cli / oxideplay / oxideav-tests) tests here so
      # a single crate's red build doesn't block the aggregator.
      - name: Build (workspace, compile-only)
        run: cargo build --workspace --all-targets --verbose

      - name: Test (native members only)
        run: cargo test -p oxideav -p oxideav-cli -p oxideplay -p oxideav-tests --verbose

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # libloading is pure Rust and oxideplay no longer links SDL2, so
      # clippy does not need any system packages installed.

      - name: Install Rust toolchain (with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # The workspace globs `crates/*`, so the sub-crate clones must be in
      # place before clippy / fmt run against them.
      - name: Clone sub-crate checkouts into crates/
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-crates.sh

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      # Lint only the native members. Sibling crates enforce their own
      # rustfmt + clippy in their own CI; applying --all / --workspace
      # here would duplicate that work and flag accumulated style drift
      # across 59 repos on every aggregator push.
      - name: cargo fmt (native members)
        run: cargo fmt -p oxideav -p oxideav-cli -p oxideplay -p oxideav-tests -- --check

      # --no-deps so clippy doesn't flag lint drift inside transitively-
      # depended-on sibling crates; each sibling's own CI enforces its
      # own lints.
      - name: cargo clippy (native members)
        run: |
          cargo clippy -p oxideav -p oxideav-cli -p oxideplay -p oxideav-tests \
            --all-targets --no-deps -- -D warnings

  # USDZ Apple-oracle job: install Apple's `usdzconvert` (from
  # KarpelesLab/usdpython) and run the black-box oracle tests in
  # oxideav-tests against it. The oracle compares Apple's USDZ output
  # vs ours for the same input scene; passing means we agree on mesh /
  # primitive / vertex counts and bounding-box extent.
  #
  # Strict source-isolation: we install the binary + invoke it as an
  # opaque process — never read or vendor its source.
  #
  # Linux + pip's `usd-core` wheel substitutes for the macOS-only
  # precompiled USD library that usdpython normally bundles; the
  # `usdzconvert` Python script imports from `pxr.*`, which `usd-core`
  # provides cross-platform.
  usdz-oracle:
    name: USDZ Apple oracle (KarpelesLab/usdpython)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Clone sub-crate checkouts into crates/
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-crates.sh

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: usdz-oracle

      # Python 3.9 is the newest version with usd-core==21.x wheels;
      # we need the OLD usd-core because Apple's usdzconvert script was
      # written against pre-22 USD APIs (e.g. `UsdGeom.Mesh.CreatePrimvar`,
      # which moved to `UsdGeomPrimvarsAPI` in 22.05). Modern usd-core
      # (24.x with Python 3.11 wheels) raises AttributeError on the old
      # call sites.
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # usd-core 21.11: last pre-deprecation version that still has the
      # full pre-22 API surface AND ships a Python 3.9 Linux wheel.
      # Pillow + numpy cover the script's image-handling import surface.
      - name: Install Python USD bindings + image deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'usd-core==21.11' Pillow numpy

      # Clone the script repo (no USD library bundled — we pulled that
      # via pip above). The script's shebang pins `python3.7`, which
      # isn't on the runner; instead of editing the script (would break
      # black-box discipline) we install a PATH shim that routes
      # invocations through the active python3 (3.9, with `pxr` from
      # usd-core in site-packages). PYTHONPATH covers the script's
      # sibling helper .py modules that lack an `__init__.py`.
      - name: Install usdpython usdzconvert script
        run: |
          git clone --depth 1 https://github.com/KarpelesLab/usdpython.git "$HOME/usdpython"
          mkdir -p "$HOME/oracle-bin"
          cat > "$HOME/oracle-bin/usdzconvert" <<'EOF'
          #!/usr/bin/env bash
          exec python3 "$HOME/usdpython/usdzconvert/usdzconvert" "$@"
          EOF
          chmod +x "$HOME/oracle-bin/usdzconvert"
          echo "$HOME/oracle-bin" >> "$GITHUB_PATH"
          echo "PYTHONPATH=$HOME/usdpython/usdzconvert" >> "$GITHUB_ENV"

      # `pip install usd-core` only ships the `pxr` Python module, NOT
      # the C++ usdcat binary that Pixar's full USD distribution
      # provides. Apple's macOS usdpython installer bundles a
      # precompiled usdcat; on Linux we have to synthesise one. This
      # tiny shim implements just the invocation our oracle uses
      # (`usdcat --usdFormat usda -o out.usdz in.usdz`) via the
      # public `pxr.Usd.Stage` API — extracts the input stage, exports
      # the root layer to ASCII USDA, repackages as a fresh USDZ.
      - name: Install usdcat shim (pxr-backed)
        run: |
          cat > "$HOME/oracle-bin/usdcat" <<'EOF'
          #!/usr/bin/env python3
          """Minimal usdcat shim — USDC→USDA inside a USDZ archive.

          Only the flags our oracle uses are honoured:
            --usdFormat usda      (default; controls inner-layer encoding)
            -o output.usdz        (required)
            input.usdz            (positional)

          Implementation is via public pxr.Usd / pxr.Sdf / pxr.UsdUtils
          APIs; we never read the source of Pixar's C++ usdcat.
          """
          import argparse, os, sys, tempfile
          from pxr import Usd, Sdf, UsdUtils

          ap = argparse.ArgumentParser()
          ap.add_argument("--usdFormat", default="usda")
          ap.add_argument("-o", dest="output", required=True)
          ap.add_argument("input")
          args = ap.parse_args()

          stage = Usd.Stage.Open(args.input)
          if stage is None:
              sys.exit(f"usdcat-shim: failed to open {args.input}")

          root = stage.GetRootLayer()
          with tempfile.TemporaryDirectory() as td:
              ascii_layer = os.path.join(td, "scene.usda")
              if not root.Export(ascii_layer, args={"format": args.usdFormat}):
                  sys.exit(f"usdcat-shim: failed to export ASCII layer")
              if not UsdUtils.CreateNewUsdzPackage(ascii_layer, args.output):
                  sys.exit(f"usdcat-shim: failed to repackage USDZ")
          EOF
          chmod +x "$HOME/oracle-bin/usdcat"

      # Hard fail if either binary doesn't run — without this, the
      # test file's skip-when-absent path would let CI go green
      # without actually exercising the oracle.
      - name: Verify usdzconvert + usdcat are callable
        run: |
          which usdzconvert
          usdzconvert -h
          which usdcat
          # Self-test: round-trip a trivial USDA→USDZ→USDA via the shim.
          python3 -c "from pxr import Usd, Sdf; print('pxr ok')"

      - name: Run USDZ Apple oracle tests
        run: |
          cargo test -p oxideav-tests --test mesh3d_usdz_apple_oracle -- --nocapture

  # 3D mesh oracle: install Blender + assimp on ubuntu-latest and run
  # the cross-format conversion tests in oxideav-tests against both
  # binaries. Each test feeds the same Scene3D through (a) ours-encode
  # → oracle-convert → ours-decode and (b) ours-encode → ours-decode,
  # then asserts mesh / vertex count and bounding-box extent agree.
  #
  # Strict source-isolation: Blender + assimp are invoked as opaque
  # binaries — we never read or vendor their source. (See workspace
  # memory `feedback_no_external_libs`.) Blender is the de-facto FBX
  # producer because Autodesk's FBX SDK is non-redistributable; the
  # oxideav-fbx round-1 decoder reads Blender's output directly.
  mesh3d-oracle:
    name: 3D mesh oracle (Blender + assimp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Clone sub-crate checkouts into crates/
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-crates.sh

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: mesh3d-oracle

      # `blender` (the Blender Foundation 3D suite) and `assimp-utils`
      # (Open Asset Import Library command-line tools) are both
      # available in the default Ubuntu archives. We ONLY use the CLI;
      # no Python packages or extra data files beyond what the apt
      # packages bundle.
      #
      # `python3-numpy` is required because Blender's bundled
      # `io_scene_gltf2` addon `import numpy` at the top of
      # `gltf2_blender_mesh.py`, and Ubuntu's `blender` package on
      # 24.04 (4.0.2+dfsg-1ubuntu8) doesn't pull it in transitively.
      # Without numpy, `bpy.ops.import_scene.gltf(...)` raises
      # `ModuleNotFoundError: No module named 'numpy'`.
      - name: Install Blender + assimp
        run: |
          sudo apt-get update
          sudo apt-get install -y blender assimp-utils python3-numpy

      # Hard-fail if either binary is missing. Without this, the test
      # file's eprintln! skip-when-absent path would let CI go green
      # without actually exercising the oracles — defeating the entire
      # purpose of the job.
      - name: Verify oracles are callable
        run: |
          which blender
          blender --version | head -3
          which assimp
          assimp version | head -3

      - name: Run mesh3d Blender + assimp oracle tests
        run: |
          cargo test -p oxideav-tests --test mesh3d_blender_assimp_oracle -- --nocapture
